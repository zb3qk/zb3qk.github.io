---
layout: default
---
<div class="jumbotron">
	<div class="row justify-content-between">
		<div class="col-sm-4">
			<h1 >{{ page.title }}</h1>
			<p>{{ page.date | date_to_string }}</p>
		</div>
		<div class="col-sm-4 align-self-end" style="align-self: top;">
			<!-- Topics -->
			<div class="topics">
			{% for tag in page.topics %}
		      <span class="badge badge-primary">{{ tag }}</span>
		  	{% endfor %}
		  	</div>
		  	<!-- Tags -->
		  	<div class="tags">
			{% for tag in page.tags %}
		      <span class="badge badge-secondary">{{ tag }}</span>
		  	{% endfor %}
		  	</div>
			<!-- <p style="text-align: center;">{{ page.tags }}</p> -->
		</div>
	</div>
</div>

<div class="container post">
	{{ content }}
</div>
