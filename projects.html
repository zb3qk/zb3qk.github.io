---
layout: default
title: Projects
---
<div class="jumbotron">
	<h1>Projects</h1>
</div>
<style>
	.projectList {

	}
</style>

<div class="container">
	<ul class="row projectList justify-content-center" style="list-style-type: none">
		{% for project in site.projects %}
		<li class='col col-lg-2 blogPost'>
			<h2>{{project.icon}}</h2>
		</li>
		<li class="col blogPost">
			<h2> <a href="{{ project.url }}">{{ project.title }}</a></h2> 
			<span class="badge badge-secondary" style="text-align: right;">{{post.date | | date_to_string: "ordinal", "US"  }}</span>
			<!-- <p>{{ project.excerpt }}</p> -->
		</li>
		<div class="w-100"></div>
		<li class="col blogPost">
			<h5>{{ project.excerpt }}</h5>
		</li>
		<div class="w-100"></div>
		<br>
		<br>
	
		{% endfor %}
  </ul>
</div>
