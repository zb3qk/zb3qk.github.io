---
layout: default
title: Blog
---
<div class="jumbotron">
	<h1>Latest Posts</h1>
</div>

<ul style="list-style-type: none">
  {% for post in site.posts %}
    <li class="jumbotron">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt }}</p>
    </li>
  {% endfor %}
</ul>
